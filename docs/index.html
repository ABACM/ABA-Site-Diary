<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>ABA Site Diary — Sign Off</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0D1B3E;
    --green: #4CAF50;
    --green-light: #E8F5E9;
    --green-dark: #2E7D32;
    --border: #D0D9D0;
    --bg: #F0F4F0;
    --text: #0D1B3E;
    --text-secondary: #4A5568;
    --text-hint: #9CA3AF;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .header { background: var(--navy); padding: 16px 20px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 10; }
  .logo { width: 40px; height: 40px; background: rgba(76,175,80,0.25); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--green); border: 1px solid var(--green); }
  .header-text h1 { color: #fff; font-size: 16px; font-weight: 600; }
  .header-text p  { color: rgba(255,255,255,0.7); font-size: 12px; margin-top: 1px; }

  .container { max-width: 600px; margin: 0 auto; padding: 16px; }

  .status-banner { border-radius: 12px; padding: 14px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 500; }
  .status-pending  { background: #FEF3D8; color: #A06010; border: 1px solid #F59E0B; }
  .status-complete { background: var(--green-light); color: var(--green-dark); border: 1px solid var(--green); }
  .status-error    { background: #FEE2E2; color: #DC2626; border: 1px solid #DC2626; }

  .card { background: #fff; border-radius: 14px; border: 0.5px solid var(--border); margin-bottom: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
  .card-header { background: var(--navy); padding: 10px 14px; }
  .card-header h2 { color: #fff; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .card-body { padding: 14px 16px; }

  .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .meta-item label { display: block; font-size: 10px; text-transform: uppercase; color: var(--text-hint); letter-spacing: 0.5px; margin-bottom: 2px; }
  .meta-item span  { font-size: 14px; font-weight: 500; color: var(--text); }

  .section-item { padding: 8px 0; border-bottom: 0.5px solid var(--bg); font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
  .section-item:last-child { border-bottom: none; }
  .section-label { font-size: 11px; font-weight: 600; color: var(--text-hint); text-transform: uppercase; margin-bottom: 6px; }

  .sub-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 0.5px solid var(--bg); font-size: 13px; }
  .sub-row:last-child { border-bottom: none; }
  .sub-name { font-weight: 500; color: var(--text); }
  .sub-detail { color: var(--text-secondary); font-size: 12px; }
  .sub-hrs { color: var(--green-dark); font-weight: 600; }

  .totals { display: flex; gap: 10px; margin-bottom: 14px; }
  .total-box { flex: 1; background: var(--green-light); border-radius: 10px; padding: 12px; text-align: center; border: 0.5px solid var(--green); }
  .total-box .num { font-size: 24px; font-weight: 700; color: var(--green); }
  .total-box .lbl { font-size: 11px; color: var(--green-dark); margin-top: 2px; }

  .cl-item { display: flex; align-items: flex-start; gap: 10px; padding: 9px 0; border-bottom: 0.5px solid var(--bg); font-size: 13px; }
  .cl-item:last-child { border-bottom: none; }
  .cl-check { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .cl-check.checked { background: var(--green); border-color: var(--green); color: #fff; font-size: 11px; font-weight: 700; }
  .cl-note { font-size: 11px; color: var(--text-hint); margin-top: 2px; }

  .sig-section { margin-top: 16px; }
  .sig-card { background: #fff; border-radius: 14px; border: 1px solid var(--border); padding: 14px 16px; margin-bottom: 10px; transition: border-color 0.2s; }
  .sig-card.signed { border-color: var(--green); background: var(--green-light); }
  .sig-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .sig-role { font-size: 15px; font-weight: 600; color: var(--text); }
  .sig-name { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
  .sig-email { font-size: 11px; color: var(--text-hint); margin-top: 1px; }
  .sig-badge { border-radius: 20px; padding: 4px 10px; font-size: 12px; font-weight: 600; }
  .sig-badge.pending  { background: var(--bg); color: var(--text-hint); }
  .sig-badge.signed   { background: var(--green-light); color: var(--green-dark); border: 0.5px solid var(--green); }
  .sig-signed-info    { font-size: 12px; color: var(--green-dark); margin-top: 6px; }

  .sign-btn { width: 100%; padding: 14px; background: var(--navy); color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
  .sign-btn:hover { background: #1A3260; }
  .sign-btn:disabled { background: var(--text-hint); cursor: not-allowed; }
  .sign-btn.green { background: var(--green); }
  .sign-btn.green:hover { background: var(--green-dark); }

  .loader { display: flex; align-items: center; justify-content: center; padding: 60px; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--green-light); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-view { text-align: center; padding: 60px 20px; }
  .error-view h2 { font-size: 18px; color: var(--text); margin-bottom: 8px; }
  .error-view p  { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }

  .confirmed-view { text-align: center; padding: 40px 20px; }
  .confirmed-view .icon { font-size: 64px; margin-bottom: 16px; }
  .confirmed-view h2 { font-size: 20px; font-weight: 700; color: var(--green-dark); margin-bottom: 8px; }
  .confirmed-view p  { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }

  .divider { border: none; border-top: 0.5px solid var(--border); margin: 14px 0; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.show { display: flex; }
  .modal { background: #fff; border-radius: 16px; padding: 24px; width: 100%; max-width: 380px; }
  .modal h3 { font-size: 17px; font-weight: 600; margin-bottom: 8px; }
  .modal p  { font-size: 14px; color: var(--text-secondary); margin-bottom: 20px; line-height: 1.5; }
  .modal-btns { display: flex; flex-direction: column; gap: 8px; }
  .modal-cancel { background: var(--bg); color: var(--text-secondary); border: none; border-radius: 10px; padding: 12px; font-size: 14px; cursor: pointer; }

  .footer { text-align: center; padding: 24px; font-size: 11px; color: var(--text-hint); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">ABA</div>
  <div class="header-text">
    <h1>Site Diary Sign-off</h1>
    <p>ABA Construction Managers (Aust) Pty Ltd</p>
  </div>
</div>

<div class="container" id="app">
  <div class="loader"><div class="spinner"></div></div>
</div>

<!-- Confirm modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">Confirm signature</h3>
    <p id="modal-body">By signing you confirm that you have reviewed this site diary entry and approve it.</p>
    <div class="modal-btns">
      <button class="sign-btn green" id="modal-confirm" onclick="confirmSign()">✓ Confirm signature</button>
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
// ─── Parse URL params ─────────────────────────────────────────────────────────
function getParams() {
  const p = new URLSearchParams(window.location.search);
  return {
    entryId:  p.get('id')   || '',
    role:     p.get('role') || '',  // pm | qa | supervisor
    name:     p.get('name') || '',
    // The full entry is base64-encoded in the 'data' param
    data:     p.get('data') || '',
    // Webhook to POST sign-off confirmation (optional — GitHub Pages static fallback)
    webhook:  p.get('wh')   || '',
  };
}

// ─── Decode entry ─────────────────────────────────────────────────────────────
function decodeEntry(b64) {
  try {
    const json = decodeURIComponent(atob(b64));
    return JSON.parse(json);
  } catch(e) {
    return null;
  }
}

// ─── Storage (localStorage for browser sign-off state) ───────────────────────
function getSigStore() {
  try { return JSON.parse(localStorage.getItem('aba_signoffs') || '{}'); } catch { return {}; }
}
function setSig(entryId, role, name) {
  const store = getSigStore();
  if (!store[entryId]) store[entryId] = {};
  store[entryId][role] = { name, at: new Date().toISOString(), confirmed: true };
  localStorage.setItem('aba_signoffs', JSON.stringify(store));
  return store[entryId];
}
function getSigs(entryId) {
  const store = getSigStore();
  return store[entryId] || {};
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
const ROLE_LABELS = { supervisor:'Site Supervisor', pm:'Project Manager', qa:'QA Representative' };
function calcSubHours(sub) {
  const t = s => { const [h,m]=(s||'07:00').split(':').map(Number); return h*60+m; };
  return Math.max(0,(t(sub.timeEnd||'15:30')-t(sub.timeStart||'07:00'))/60);
}
function fmt(d) {
  try {
    const dt = new Date(d + 'T12:00:00');
    return dt.toLocaleDateString('en-AU', {weekday:'long',day:'numeric',month:'long',year:'numeric'});
  } catch { return d || '—'; }
}
function fmtAt(iso) {
  try { return new Date(iso).toLocaleString('en-AU'); } catch { return iso; }
}

// ─── Render ───────────────────────────────────────────────────────────────────
const params = getParams();
let entry = null;
let pendingRole = null;

function render() {
  const app = document.getElementById('app');
  if (!params.data) { renderError('No diary data found. Please use the link from your email.'); return; }
  entry = decodeEntry(params.data);
  if (!entry) { renderError('Could not read diary data. The link may be corrupted.'); return; }

  const sigs = getSigs(entry.id);
  const myRole = params.role;
  const mySig = sigs[myRole];
  const allRoles = ['supervisor','pm','qa'];
  const allSigned = allRoles.every(r => sigs[r]?.confirmed);

  let html = '';

  // Status banner
  if (allSigned) {
    html += `<div class="status-banner status-complete">✅ All parties have signed off — diary is complete</div>`;
  } else if (mySig?.confirmed) {
    html += `<div class="status-banner status-complete">✅ You have signed this entry. Awaiting other signatures.</div>`;
  } else {
    html += `<div class="status-banner status-pending">⏳ This diary entry requires your review and signature</div>`;
  }

  // Entry details card
  html += `<div class="card">
    <div class="card-header"><h2>Diary entry details</h2></div>
    <div class="card-body">
      <div class="meta-grid" style="margin-bottom:14px">
        <div class="meta-item"><label>Date</label><span>${fmt(entry.date)}</span></div>
        <div class="meta-item"><label>Project</label><span>${entry.projectName||'—'}</span></div>
        <div class="meta-item"><label>Project No.</label><span>${entry.projectNo||'—'}</span></div>
        <div class="meta-item"><label>Weather AM</label><span>${entry.weatherAM||'—'}</span></div>
        <div class="meta-item"><label>Weather PM</label><span>${entry.weatherPM||'—'}</span></div>
      </div>`;

  // Subcontractor totals
  if ((entry.subs||[]).length) {
    let totP=0, totH=0;
    entry.subs.forEach(s=>{const p=parseInt(s.personnel)||0;totP+=p;totH+=p*calcSubHours(s);});
    html += `<div class="totals">
      <div class="total-box"><div class="num">${totP}</div><div class="lbl">Total personnel</div></div>
      <div class="total-box"><div class="num">${totH.toFixed(1)}</div><div class="lbl">Labour hours</div></div>
    </div>`;
  }
  html += `</div></div>`;

  // Work sections
  const SECTIONS = {work:'Work in progress',delays:'Delays incurred',oral:'Oral instructions',drawings:'Drawings & memos received'};
  Object.entries(SECTIONS).forEach(([key,label]) => {
    const lines = (entry.sections?.[key]||[]).filter(Boolean);
    if (!lines.length) return;
    html += `<div class="card"><div class="card-header"><h2>${label}</h2></div><div class="card-body">
      ${lines.map(l=>`<div class="section-item">${l}</div>`).join('')}
    </div></div>`;
  });

  // Subcontractors
  if ((entry.subs||[]).length) {
    html += `<div class="card"><div class="card-header"><h2>Subcontractors on site</h2></div><div class="card-body">
      ${entry.subs.map(s=>{
        const p=parseInt(s.personnel)||0,h=calcSubHours(s);
        return `<div class="sub-row">
          <div><div class="sub-name">${s.name||'—'}</div><div class="sub-detail">${s.timeStart||'—'}–${s.timeEnd||'—'} · ${p} personnel</div>${s.notes?`<div class="sub-detail">${s.notes}</div>`:''}</div>
          <div class="sub-hrs">${(p*h).toFixed(1)} hrs</div>
        </div>`;
      }).join('')}
    </div></div>`;
  }

  // Checklist
  const CL = ['Inspections and Tests','Visitors and Purposes','Discussions and Meetings','Shortage of Information','Delays, Defects – Client supplies','Planning information required','Equipment on hire','Messages'];
  const checkedItems = CL.filter((_,i)=>entry.checklist?.[i]?.checked);
  if (checkedItems.length) {
    html += `<div class="card"><div class="card-header"><h2>Checklist items</h2></div><div class="card-body">
      ${CL.map((item,i)=>{
        const cl=entry.checklist?.[i]||{};
        const notes = Array.isArray(cl.notes) ? cl.notes.filter(Boolean) : (cl.note ? [cl.note] : []);
        const notesHtml = notes.map(n=>`<div class="cl-note">${n}</div>`).join('');
        if(!cl.checked) return '';
        return `<div class="cl-item">
          <div class="cl-check checked">✓</div>
          <div><div>${i+1}. ${item}</div>${notesHtml}</div>
        </div>`;
      }).join('')}
    </div></div>`;
  }

  if (entry.addlNotes) {
    html += `<div class="card"><div class="card-header"><h2>Additional notes</h2></div><div class="card-body"><p style="font-size:13px;color:#4A5568;line-height:1.6">${entry.addlNotes}</p></div></div>`;
  }

  // Signatures section
  html += `<div class="sig-section"><div class="card"><div class="card-header"><h2>Signatures</h2></div><div class="card-body">`;
  allRoles.forEach(role => {
    const sig = sigs[role];
    const signed = sig?.confirmed;
    const roleLabel = ROLE_LABELS[role];
    html += `<div class="sig-card${signed?' signed':''}">
      <div class="sig-card-top">
        <div>
          <div class="sig-role">${roleLabel}</div>
          ${signed?`<div class="sig-signed-info">✓ Signed by ${sig.name} on ${fmtAt(sig.at)}</div>`:'<div class="sig-name" style="color:#9CA3AF">Signature pending</div>'}
        </div>
        <div class="sig-badge ${signed?'signed':'pending'}">${signed?'✓ Signed':'Pending'}</div>
      </div>
      ${role===myRole&&!signed?`<button class="sign-btn" onclick="openModal('${role}','${params.name||roleLabel}')">Tap to sign as ${params.name||roleLabel}</button>`:''}
    </div>`;
  });
  html += `</div></div></div>`;

  if (allSigned) {
    html += `<div class="card" style="border-color:#4CAF50;background:#E8F5E9;text-align:center;padding:20px">
      <div style="font-size:40px;margin-bottom:8px">✅</div>
      <div style="font-size:16px;font-weight:700;color:#2E7D32">All parties have signed off</div>
      <div style="font-size:13px;color:#4CAF50;margin-top:4px">The completed diary PDF will be emailed automatically.</div>
    </div>`;
  }

  html += `<div class="footer">ABA Construction Managers (Aust) Pty Ltd · Site Diary Ref: aba-220 Rev.2</div>`;
  app.innerHTML = html;
}

function openModal(role, name) {
  pendingRole = { role, name };
  document.getElementById('modal-title').textContent = `Sign as ${ROLE_LABELS[role]}`;
  document.getElementById('modal-body').textContent = `By signing you confirm that you have reviewed the site diary entry for ${entry?.projectName||'this project'} dated ${entry?.date||''} and approve it.`;
  document.getElementById('modal').classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
  pendingRole = null;
}

function confirmSign() {
  if (!pendingRole) return;
  setSig(entry.id, pendingRole.role, pendingRole.name);
  closeModal();
  render();

  // Check if all signed — show completion message
  const sigs = getSigs(entry.id);
  const allSigned = ['supervisor','pm','qa'].every(r=>sigs[r]?.confirmed);
  if (allSigned) {
    setTimeout(()=>{
      alert('✅ All parties have now signed off! The site diary is complete. The app will automatically generate and email the PDF when the Site Supervisor opens the app.');
    }, 300);
  }
}

// ─── Init ─────────────────────────────────────────────────────────────────────
function renderError(msg) {
  document.getElementById('app').innerHTML = `<div class="error-view"><h2>⚠️ Unable to load diary</h2><p>${msg}</p></div>`;
}

render();
</script>
</body>
</html>
