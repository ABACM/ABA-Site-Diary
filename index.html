<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>ABA Site Diary Sign-Off</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0D1B3E;--green:#4CAF50;--green-light:#E8F5E9;--green-dark:#2E7D32;--border:#D0D9D0;--bg:#F0F4F0;--text:#0D1B3E;--text2:#4A5568;--hint:#9CA3AF}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:var(--navy);padding:16px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.logo{width:40px;height:40px;background:rgba(76,175,80,0.25);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--green);border:1px solid var(--green)}
.header h1{color:#fff;font-size:16px;font-weight:600}
.header p{color:rgba(255,255,255,0.7);font-size:12px;margin-top:1px}
.container{max-width:600px;margin:0 auto;padding:16px}
.status-banner{border-radius:12px;padding:14px 16px;margin-bottom:16px;font-size:14px;font-weight:500}
.status-pending{background:#FEF3D8;color:#A06010;border:1px solid #F59E0B}
.status-complete{background:var(--green-light);color:var(--green-dark);border:1px solid var(--green)}
.card{background:#fff;border-radius:14px;border:0.5px solid var(--border);margin-bottom:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.card-header{background:var(--navy);padding:10px 14px}
.card-header h2{color:#fff;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.card-body{padding:14px 16px}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.meta-item label{display:block;font-size:10px;text-transform:uppercase;color:var(--hint);letter-spacing:.5px;margin-bottom:2px}
.meta-item span{font-size:14px;font-weight:500}
.entry-line{padding:8px 0;border-bottom:.5px solid var(--bg);font-size:13px;color:var(--text2);line-height:1.5}
.entry-line:last-child{border-bottom:none}
.sub-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:.5px solid var(--bg);font-size:13px}
.sub-row:last-child{border-bottom:none}
.sub-name{font-weight:500}
.sub-detail{color:var(--text2);font-size:12px}
.sub-hrs{color:var(--green-dark);font-weight:600}
.totals{display:flex;gap:10px;margin-bottom:14px}
.total-box{flex:1;background:var(--green-light);border-radius:10px;padding:12px;text-align:center;border:.5px solid var(--green)}
.total-box .num{font-size:24px;font-weight:700;color:var(--green)}
.total-box .lbl{font-size:11px;color:var(--green-dark);margin-top:2px}
.cl-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:.5px solid var(--bg);font-size:13px}
.cl-item:last-child{border-bottom:none}
.cl-check{width:20px;height:20px;border-radius:50%;background:var(--green);border-color:var(--green);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;font-size:11px;font-weight:700}
.cl-note{font-size:11px;color:var(--hint);margin-top:2px}
.sig-card{background:#fff;border-radius:14px;border:1px solid var(--border);padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.sig-card.signed{border-color:var(--green);background:var(--green-light)}
.sig-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.sig-role{font-size:15px;font-weight:600}
.sig-name{font-size:13px;color:var(--text2);margin-top:2px}
.sig-email{font-size:11px;color:var(--hint);margin-top:1px}
.sig-badge{border-radius:20px;padding:4px 10px;font-size:12px;font-weight:600}
.sig-badge.pending{background:var(--bg);color:var(--hint)}
.sig-badge.signed{background:var(--green-light);color:var(--green-dark);border:.5px solid var(--green)}
.sig-at{font-size:12px;color:var(--green-dark);margin-top:6px}
.sign-btn{width:100%;padding:14px;background:var(--navy);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px}
.sign-btn:hover{background:#1A3260}
.sign-btn.green{background:var(--green)}
.sign-btn.green:hover{background:var(--green-dark)}
.loader{display:flex;align-items:center;justify-content:center;padding:80px}
.spinner{width:40px;height:40px;border:3px solid var(--green-light);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-view{text-align:center;padding:60px 20px}
.error-view h2{font-size:18px;margin-bottom:8px}
.error-view p{font-size:14px;color:var(--text2);line-height:1.6}
.complete-box{background:var(--green-light);border-radius:14px;border:1px solid var(--green);padding:24px;text-align:center;margin-top:8px}
.complete-box h2{font-size:18px;font-weight:700;color:var(--green-dark);margin-bottom:6px}
.complete-box p{font-size:13px;color:var(--green-dark)}
.footer{text-align:center;padding:24px;font-size:11px;color:var(--hint)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:380px}
.modal h3{font-size:17px;font-weight:600;margin-bottom:8px}
.modal p{font-size:14px;color:var(--text2);margin-bottom:20px;line-height:1.5}
.modal-btns{display:flex;flex-direction:column;gap:8px}
.modal-cancel{background:var(--bg);color:var(--text2);border:none;border-radius:10px;padding:12px;font-size:14px;cursor:pointer}
</style>
</head>
<body>
<div class="header">
  <div class="logo">ABA</div>
  <div>
    <h1>Site Diary Sign-off</h1>
    <p>ABA Construction Managers (Aust) Pty Ltd</p>
  </div>
</div>
<div class="container" id="app">
  <div class="loader"><div class="spinner"></div></div>
</div>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">Confirm signature</h3>
    <p id="modal-body">By signing you confirm that you have reviewed and approve this site diary entry.</p>
    <div class="modal-btns">
      <button class="sign-btn green" onclick="confirmSign()">✓ Confirm signature</button>
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>
<script>
var ROLE_LABELS={supervisor:'Site Supervisor',pm:'Project Manager',qa:'QA Representative'};
var params=new URLSearchParams(window.location.search);
var entryId=params.get('id')||'';
var myRole=params.get('role')||'';
var myName=params.get('name')||ROLE_LABELS[myRole]||'Signatory';
var dataB64=params.get('data')||'';
var entry=null;
var pendingRole=null;

function decodeEntry(b64){
  try{return JSON.parse(decodeURIComponent(atob(b64)));}catch(e){return null;}
}
function calcSubHours(sub){
  var t=function(s){var p=(s||'07:00').split(':').map(Number);return p[0]*60+p[1];};
  return Math.max(0,(t(sub.timeEnd||'15:30')-t(sub.timeStart||'07:00'))/60);
}
function fmtDate(d){
  try{
    var p=d.split('-');
    var dt=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));
    return dt.toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  }catch(e){return d||'—';}
}
function fmtAt(iso){try{return new Date(iso).toLocaleString('en-AU');}catch(e){return iso;}}
function getSigStore(){try{return JSON.parse(localStorage.getItem('aba_signoffs')||'{}');}catch(e){return {};}}
function setSig(id,role,name){
  var store=getSigStore();
  if(!store[id])store[id]={};
  store[id][role]={name:name,at:new Date().toISOString(),confirmed:true};
  localStorage.setItem('aba_signoffs',JSON.stringify(store));
  return store[id];
}
function getSigs(id){return getSigStore()[id]||{};}

function renderError(msg){
  document.getElementById('app').innerHTML='<div class="error-view"><h2>⚠️ Unable to load diary</h2><p>'+msg+'</p></div>';
}

function render(){
  if(!dataB64){renderError('No diary data in this link. Please use the link from your email.');return;}
  entry=decodeEntry(dataB64);
  if(!entry){renderError('Could not read diary data. The link may be too old or corrupted. Ask the Site Supervisor to save and resubmit the entry.');return;}

  var sigs=getSigs(entry.id||entryId);
  var mySig=sigs[myRole];
  var allRoles=['supervisor','pm','qa'];
  var allSigned=allRoles.every(function(r){return sigs[r]&&sigs[r].confirmed;});

  var html='';

  if(allSigned){
    html+='<div class="status-banner status-complete">✅ All parties have signed off — diary is complete</div>';
  } else if(mySig&&mySig.confirmed){
    html+='<div class="status-banner status-complete">✅ You have signed this entry. Awaiting other signatures.</div>';
  } else {
    html+='<div class="status-banner status-pending">⏳ This diary entry requires your review and signature</div>';
  }

  // Entry details
  var subs=entry.subs||[];
  var totP=0,totH=0;
  subs.forEach(function(s){var p=parseInt(s.personnel)||0;totP+=p;totH+=p*calcSubHours(s);});

  html+='<div class="card"><div class="card-header"><h2>Entry details</h2></div><div class="card-body">';
  html+='<div class="meta-grid">';
  html+='<div class="meta-item"><label>Date</label><span>'+fmtDate(entry.date)+'</span></div>';
  html+='<div class="meta-item"><label>Project</label><span>'+(entry.projectName||'—')+'</span></div>';
  html+='<div class="meta-item"><label>Project No.</label><span>'+(entry.projectNo||'—')+'</span></div>';
  html+='<div class="meta-item"><label>Weather AM</label><span>'+(entry.weatherAM||'—')+'</span></div>';
  html+='<div class="meta-item"><label>Weather PM</label><span>'+(entry.weatherPM||'—')+'</span></div>';
  html+='</div>';
  if(subs.length){
    html+='<div class="totals"><div class="total-box"><div class="num">'+totP+'</div><div class="lbl">Total personnel</div></div><div class="total-box"><div class="num">'+totH.toFixed(1)+'</div><div class="lbl">Labour hours</div></div></div>';
  }
  html+='</div></div>';

  // Work sections
  var SECTIONS={work:'Work in progress',delays:'Delays incurred',oral:'Oral instructions',drawings:'Drawings & memos received'};
  Object.keys(SECTIONS).forEach(function(key){
    var lines=(entry.sections&&entry.sections[key]||[]).filter(Boolean);
    if(!lines.length)return;
    html+='<div class="card"><div class="card-header"><h2>'+SECTIONS[key]+'</h2></div><div class="card-body">';
    lines.forEach(function(l){html+='<div class="entry-line">'+l+'</div>';});
    html+='</div></div>';
  });

  // Subcontractors
  if(subs.length){
    html+='<div class="card"><div class="card-header"><h2>Subcontractors on site</h2></div><div class="card-body">';
    subs.forEach(function(s){
      var p=parseInt(s.personnel)||0,h=calcSubHours(s);
      html+='<div class="sub-row"><div><div class="sub-name">'+(s.name||'—')+'</div><div class="sub-detail">'+
        (s.timeStart||'—')+'–'+(s.timeEnd||'—')+' · '+p+' personnel'+(s.notes?'<br>'+s.notes:'')+'</div></div>'+
        '<div class="sub-hrs">'+(p*h).toFixed(1)+' hrs</div></div>';
    });
    html+='</div></div>';
  }

  // Checklist
  var CL=['Inspections and Tests','Visitors and Purposes','Discussions and Meetings','Shortage of Information','Delays, Defects – Client supplies','Planning information required','Equipment on hire','Messages'];
  var checkedItems=CL.filter(function(_,i){return entry.checklist&&entry.checklist[i]&&entry.checklist[i].checked;});
  if(checkedItems.length){
    html+='<div class="card"><div class="card-header"><h2>Checklist</h2></div><div class="card-body">';
    CL.forEach(function(item,i){
      var cl=(entry.checklist&&entry.checklist[i])||{};
      if(!cl.checked)return;
      var notes=Array.isArray(cl.notes)?cl.notes.filter(Boolean):(cl.note?[cl.note]:[]);
      html+='<div class="cl-item"><div class="cl-check">✓</div><div><div>'+(i+1)+'. '+item+'</div>'+
        notes.map(function(n){return '<div class="cl-note">'+n+'</div>';}).join('')+'</div></div>';
    });
    html+='</div></div>';
  }

  if(entry.addlNotes){
    html+='<div class="card"><div class="card-header"><h2>Additional notes</h2></div><div class="card-body"><p style="font-size:13px;color:#4A5568;line-height:1.6">'+entry.addlNotes+'</p></div></div>';
  }

  // Signatures
  html+='<div class="card"><div class="card-header"><h2>Signatures</h2></div><div class="card-body">';
  allRoles.forEach(function(role){
    var sig=sigs[role];
    var signed=sig&&sig.confirmed;
    html+='<div class="sig-card'+(signed?' signed':'')+'">'+
      '<div class="sig-top"><div><div class="sig-role">'+ROLE_LABELS[role]+'</div>'+
      (signed?'<div class="sig-at">✓ Signed by '+sig.name+' on '+fmtAt(sig.at)+'</div>':'<div class="sig-name" style="color:var(--hint)">Pending</div>')+'</div>'+
      '<div class="sig-badge '+(signed?'signed':'pending')+'">'+(signed?'✓ Signed':'Pending')+'</div></div>';
    if(role===myRole&&!signed){
      html+='<button class="sign-btn" onclick="openModal(\''+role+'\',\''+myName+'\')">Tap to sign as '+myName+'</button>';
    }
    html+='</div>';
  });
  html+='</div></div>';

  if(allSigned){
    html+='<div class="complete-box"><h2>✅ All parties signed off</h2><p>The site diary is complete. The PDF will be emailed automatically.</p></div>';
  }

  html+='<div class="footer">ABA Construction Managers (Aust) Pty Ltd · Site Diary Ref: aba-220 Rev.2<br>5/28 Essington Street, Mitchell ACT 2911 · (02) 6242 3400</div>';
  document.getElementById('app').innerHTML=html;
}

function openModal(role,name){
  pendingRole={role:role,name:name};
  document.getElementById('modal-title').textContent='Sign as '+ROLE_LABELS[role];
  document.getElementById('modal-body').textContent='By signing you confirm you have reviewed the site diary for '+(entry.projectName||'this project')+' dated '+(entry.date||'')+' and approve it.';
  document.getElementById('modal').classList.add('show');
}
function closeModal(){document.getElementById('modal').classList.remove('show');pendingRole=null;}
function confirmSign(){
  if(!pendingRole)return;
  setSig(entry.id||entryId,pendingRole.role,pendingRole.name);
  closeModal();
  render();
  var sigs=getSigs(entry.id||entryId);
  var allSigned=['supervisor','pm','qa'].every(function(r){return sigs[r]&&sigs[r].confirmed;});
  if(allSigned){
    setTimeout(function(){
      alert('✅ All parties have now signed! The Site Supervisor will be notified to complete the final sign-off in the app, which will trigger the PDF email.');
    },400);
  }
}

render();
</script>
</body>
</html>
